services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8090:8090"
    environment:
      OCR_PROVIDER: mock
      OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY:-}
      OPENCODE_GO_MODEL: ${OPENCODE_GO_MODEL:-deepseek-v4-flash}
    volumes:
      - app_data:/app/pb_data
    command: ["serve", "--http=0.0.0.0:8090"]

volumes:
  app_data:
