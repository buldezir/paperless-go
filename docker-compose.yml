services:
  backend:
    build:
      context: ./backend
    ports:
      - "8090:8090"
    environment:
      OCR_PROVIDER: mock
      OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY:-}
      OPENCODE_GO_MODEL: ${OPENCODE_GO_MODEL:-deepseek-v4-flash}
    volumes:
      - backend_data:/app/pb_data
    command: ["serve", "--http=0.0.0.0:8090"]

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_POCKETBASE_URL: http://127.0.0.1:8090
    depends_on:
      - backend

volumes:
  backend_data:
